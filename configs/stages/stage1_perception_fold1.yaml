name: stage1_perception_fold1
stage_index: 1
checkpoint_prefix: stage1
best_checkpoint_name: stage1_best_joint_f1.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 0.0
  inv: 0.0
  med: 1.0
  attr: 1.0
  pol: 0.0
selection_metric: joint_score
maximize_metric: true
tie_breakers:
  - metric: medium_f1_interface
    mode: max
  - metric: loss_total
    mode: min
  - metric: epoch
    mode: min
train:
  epochs: 20
