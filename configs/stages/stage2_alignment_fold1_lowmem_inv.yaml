name: stage2_alignment_fold1_lowmem_inv
stage_index: 2
checkpoint_prefix: stage2_lowmem_inv
best_checkpoint_name: stage2_lowmem_inv_best_joint_f1.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 1.0
  inv: 0.5
  med: 1.0
  attr: 1.0
  pol: 0.0
selection_metric: joint_score
maximize_metric: true
tie_breakers:
  - metric: contrastive_loss_sum
    mode: min
  - metric: medium_f1_interface
    mode: max
  - metric: epoch
    mode: min
data:
  num_frames_per_window: 4
model:
  visual:
    use_lora: true
    max_windows_per_encode: 2
train:
  epochs: 20
  batch_size: 2
  num_workers: 4
  samples_per_object: 2
  val_every_n_epochs: 2
