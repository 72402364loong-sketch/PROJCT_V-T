name: stage36d_b_physical_balanced_residual_oracle_gate_delta_diagnostic
stage_index: 36
checkpoint_prefix: stage36d_b_physical_balanced_residual_oracle_gate_delta_diagnostic
best_checkpoint_name: stage36d_b_physical_balanced_residual_oracle_gate_delta_diagnostic_best_control_interface_mae.pt
split: data/splits/split_unseen_physical_balanced_fold1_v1.yaml
tail_mode: all_valid
freeze_modules:
  - visual_encoder
  - content_encoder
  - evidence_encoder
  - medium_head
  - attribute_head.shared
  - attribute_head.fragility
  - attribute_head.geometry
  - attribute_head.surface
  - physical_attribute_head
  - policy_head.base_state_input_layer
  - policy_head.base_hidden_layer
  - policy_head.base_output_layer
loss_weights:
  clip: 0.0
  inv: 0.0
  med: 0.0
  attr: 0.0
  physical: 0.0
  pol: 1.0
policy_loss:
  type: explicit_reference_delta_weighted_smooth_l1
  all_weight: 0.0
  interface_weight: 0.0
  stable_weight: 0.0
  base_reference_weight: 0.0
  base_stable_weight: 0.0
  residual_interface_weight: 10.0
  residual_stable_zero_weight: 0.05
  residual_non_interface_weight: 0.0
  gated_residual_interface_weight: 0.0
  quiet_weight: 0.0
  interface_positive_bias_weight: 0.0
  interface_bias_margin: 0.0
  beta: 0.5
  delta_normalization_scale: 100.0
selection_metric: control_interface_mae
maximize_metric: false
tie_breakers:
  - metric: control_overall_mae
    mode: min
  - metric: epoch
    mode: min
data:
  num_frames_per_window: 4
  attribute_taxonomy: coarse_v2
  physical_attribute_norm_stats_path: data/processed/stats/physical_attribute_norm_stats_split_unseen_physical_balanced_fold1_v1.json
  reference_force_window_count: 3
  reference_force_statistic: median
  expert_force_mode: local_reference_delta
  expert_force_smoothing: zero_phase_ema
  expert_force_baseline_mode: pre_contact_median
  expert_force_baseline_window_sec: 0.5
  expert_force_interface_margin_sec: 0.1
model:
  visual:
    use_lora: true
    max_windows_per_encode: 2
  attributes:
    fragility_classes: 2
    geometry_classes: 2
    surface_classes: 2
    metric_tasks:
      - fragility
      - geometry
  physical_attributes:
    enabled: true
    hidden_dim: 128
    dropout: 0.0
  policy:
    head_type: state_residual
    base_source: reference_force
    gate_source: hard_phase
    gate_stabilizer:
      enabled: false
train:
  epochs: 8
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  sampling_mode: interface_object_aware
  interface_sampler_alpha: 2.5
  interface_sampler_min_expert_windows: 1
  samples_per_object: 1
  val_every_n_epochs: 1
  early_stopping_patience: 3
  warmup_ratio: 0.05
  learning_rate: 0.00005
  base_learning_rate: 0.00005
  lora_learning_rate: 0.00001
  amp_enabled: false
