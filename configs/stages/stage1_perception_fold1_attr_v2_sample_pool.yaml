name: stage1_perception_fold1_attr_v2_sample_pool
stage_index: 1
checkpoint_prefix: stage1_attr_v2_sample_pool
best_checkpoint_name: stage1_attr_v2_sample_pool_best_joint_f1.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 0.0
  inv: 0.0
  med: 1.0
  attr: 1.0
  pol: 0.0
attribute_loss:
  mode: sample_primary
  sample_weight: 1.0
  window_weight: 0.2
  window_selection: stable_water_air
selection_metric: joint_score
maximize_metric: true
tie_breakers:
  - metric: medium_f1_interface
    mode: max
  - metric: loss_total
    mode: min
  - metric: epoch
    mode: min
data:
  visual_feature_cache_dir: data/processed/cache/visual_stage1_perception_fold1
  attribute_taxonomy: coarse_v2
model:
  visual:
    use_lora: false
  attributes:
    fragility_classes: 2
    geometry_classes: 2
    surface_classes: 2
    metric_tasks:
      - fragility
      - geometry
train:
  epochs: 20
  batch_size: 2
  num_workers: 4
  val_every_n_epochs: 2
