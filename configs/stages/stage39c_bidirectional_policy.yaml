  evidence_sha256: 1b256b1c70e5beb7639ffcf586238429911814bb5d435706bfff8c5fd27daf8a

initialization:
  required: true
  expected_source_stage: stage39b_bidirectional_medium
  allow_lora_injection: true
  allowed_missing_prefixes: []

freeze_modules:
  - visual_encoder
  - content_encoder
  - evidence_encoder
  - medium_head
