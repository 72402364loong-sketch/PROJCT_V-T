extends: stage39_bidirectional_base.yaml
name: stage39c_bidirectional_policy
checkpoint_prefix: stage39c_bidirectional_policy
best_checkpoint_name: stage39c_bidirectional_policy_best_finger_control_interface_mae_macro_direction.pt

training_readiness:
  status: ready
  reason: M5-0 E0 W2A baseline completed and retention guard configured.
