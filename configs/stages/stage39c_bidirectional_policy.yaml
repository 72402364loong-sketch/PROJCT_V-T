  - direction_embedding
  - attribute_head
  - policy_head.finger_embedding
  - policy_head.finger_base_state_input_layer
  - policy_head.finger_base_hidden_layer
  - policy_head.finger_base_output_layer

expected_trainable_prefixes:
  - policy_direction_adapter
  - policy_head.film
  - policy_head.finger_residual_task_input_layer
  - policy_head.finger_residual_state_input_layer
  - policy_head.finger_residual_context_input_layer
  - policy_head.finger_residual_context_scale
  - policy_head.finger_residual_hidden_layer
  - policy_head.finger_residual_pos_output_layer
  - policy_head.finger_residual_neg_output_layer
  - policy_head.finger_residual_direction_output_layer

loss_weights:
