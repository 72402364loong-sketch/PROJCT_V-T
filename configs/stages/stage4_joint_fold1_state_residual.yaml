name: stage4_joint_fold1_state_residual
stage_index: 4
checkpoint_prefix: stage4_state_residual
best_checkpoint_name: stage4_state_residual_best_hit200.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 0.25
  inv: 0.1
  med: 1.0
  attr: 1.0
  pol: 0.02
policy_loss:
  type: decomposed_interface_residual_weighted_smooth_l1
  all_weight: 0.25
  interface_weight: 3.0
  stable_weight: 0.25
  base_weight: 0.25
  base_stable_weight: 0.5
  residual_interface_weight: 4.0
  residual_stable_zero_weight: 1.0
  residual_non_interface_weight: 0.25
  gated_residual_interface_weight: 1.0
  quiet_weight: 0.1
  beta: 1.0
  detach_base_target: true
selection_metric: interface_hit_rate_200
maximize_metric: true
tie_breakers:
  - metric: interface_mae
    mode: min
  - metric: medium_f1_interface
    mode: max
  - metric: joint_score
    mode: max
  - metric: epoch
    mode: min
data:
  num_frames_per_window: 4
model:
  visual:
    use_lora: true
    max_windows_per_encode: 2
  policy:
    head_type: state_residual
train:
  epochs: 10
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  sampling_mode: interface_object_aware
  interface_sampler_alpha: 1.5
  interface_sampler_min_expert_windows: 1
  samples_per_object: 2
  val_every_n_epochs: 1
  early_stopping_patience: 4
  warmup_ratio: 0.05
  learning_rate: 0.00001
  base_learning_rate: 0.00001
  lora_learning_rate: 0.000005
