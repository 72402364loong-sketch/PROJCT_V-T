name: stage1_perception_physical_balanced
stage_index: 1
checkpoint_prefix: stage1_physical_balanced
best_checkpoint_name: stage1_physical_balanced_best_joint_f1.pt
split: data/splits/split_unseen_physical_balanced_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 0.0
  inv: 0.0
  med: 1.0
  attr: 1.0
  physical: 1.0
  pol: 0.0
attribute_loss:
  mode: sample_primary
  sample_weight: 1.0
  window_weight: 0.2
  window_selection: stable_water_air
physical_loss:
  huber_beta: 1.0
  weights:
    dry_mass: 0.2
    capacity_ratio: 0.2
    is_open_container: 0.2
selection_metric: joint_score
maximize_metric: true
tie_breakers:
  - metric: physical_sample_is_open_macro_f1
    mode: max
  - metric: physical_sample_capacity_ratio_rmse
    mode: min
  - metric: physical_sample_dry_mass_g_rmse
    mode: min
  - metric: medium_f1_interface
    mode: max
  - metric: loss_total
    mode: min
  - metric: epoch
    mode: min
data:
  visual_feature_cache_dir: data/processed/cache/visual_stage1_perception_fold1
  attribute_taxonomy: coarse_v2
  physical_attribute_norm_stats_path: data/processed/stats/physical_attribute_norm_stats_split_unseen_physical_balanced_fold1_v1.json
model:
  visual:
    use_lora: false
  attributes:
    fragility_classes: 2
    geometry_classes: 2
    surface_classes: 2
    metric_tasks:
      - fragility
      - geometry
  physical_attributes:
    enabled: true
    hidden_dim: 128
    dropout: 0.0
train:
  epochs: 20
  batch_size: 2
  num_workers: 4
  val_every_n_epochs: 2
