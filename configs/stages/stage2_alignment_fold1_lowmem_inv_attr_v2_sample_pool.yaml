name: stage2_alignment_fold1_lowmem_inv_attr_v2_sample_pool
stage_index: 2
checkpoint_prefix: stage2_lowmem_inv_attr_v2_sample_pool
best_checkpoint_name: stage2_lowmem_inv_attr_v2_sample_pool_best_joint_f1.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 1.0
  inv: 0.5
  med: 1.0
  attr: 1.0
  pol: 0.0
attribute_loss:
  mode: sample_primary
  sample_weight: 1.0
  window_weight: 0.2
  window_selection: stable_water_air
selection_metric: joint_score
maximize_metric: true
tie_breakers:
  - metric: sample_attr_stable_water_air_mean_logits_attr_macro_f1_avg
    mode: max
  - metric: medium_f1_interface
    mode: max
  - metric: contrastive_loss_sum
    mode: min
  - metric: epoch
    mode: min
data:
  num_frames_per_window: 4
  attribute_taxonomy: coarse_v2
model:
  visual:
    use_lora: true
    max_windows_per_encode: 2
  attributes:
    fragility_classes: 2
    geometry_classes: 2
    surface_classes: 2
    metric_tasks:
      - fragility
      - geometry
train:
  epochs: 20
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  samples_per_object: 2
  val_every_n_epochs: 2
