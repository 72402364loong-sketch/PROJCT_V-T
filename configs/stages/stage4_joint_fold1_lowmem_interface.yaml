name: stage4_joint_fold1_lowmem_interface
stage_index: 4
checkpoint_prefix: stage4_lowmem_interface
best_checkpoint_name: stage4_lowmem_interface_best_interface_mae.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules: []
loss_weights:
  clip: 1.0
  inv: 0.5
  med: 1.0
  attr: 1.0
  pol: 0.01
policy_loss:
  type: interface_weighted_smooth_l1
  all_weight: 1.0
  interface_weight: 4.0
  stable_weight: 0.25
  beta: 1.0
selection_metric: interface_mae
maximize_metric: false
tie_breakers:
  - metric: overall_mae
    mode: min
  - metric: medium_f1_interface
    mode: max
  - metric: joint_score
    mode: max
  - metric: epoch
    mode: min
data:
  num_frames_per_window: 4
model:
  visual:
    use_lora: true
    max_windows_per_encode: 2
train:
  epochs: 10
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  samples_per_object: 2
  val_every_n_epochs: 2
  early_stopping_patience: 3
  warmup_ratio: 0.0
  learning_rate: 0.00001
  base_learning_rate: 0.00001
  lora_learning_rate: 0.000005
