name: stage35_policy_fold1_interface_residual
stage_index: 35
checkpoint_prefix: stage35_interface_residual
best_checkpoint_name: stage35_interface_residual_best_hit200.pt
split: data/splits/split_unseen_fold1_v1.yaml
tail_mode: all_valid
freeze_modules:
  - visual_encoder
  - content_encoder
  - evidence_encoder
  - medium_head
  - attribute_head.shared
  - attribute_head.fragility
  - attribute_head.geometry
  - attribute_head.surface
loss_weights:
  clip: 0.0
  inv: 0.0
  med: 0.0
  attr: 0.0
  pol: 1.0
policy_loss:
  type: interface_residual_weighted_smooth_l1
  all_weight: 0.5
  interface_weight: 8.0
  stable_weight: 0.0
  quiet_weight: 0.1
  beta: 1.0
selection_metric: interface_hit_rate_200
maximize_metric: true
tie_breakers:
  - metric: interface_mae
    mode: min
  - metric: overall_mae
    mode: min
  - metric: epoch
    mode: min
data:
  num_frames_per_window: 4
model:
  visual:
    use_lora: true
    max_windows_per_encode: 2
  policy:
    head_type: interface_residual
train:
  epochs: 8
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  sampling_mode: interface_aware
  interface_sampler_alpha: 2.0
  interface_sampler_min_expert_windows: 1
  val_every_n_epochs: 1
  early_stopping_patience: 3
  warmup_ratio: 0.0
  learning_rate: 0.00002
  base_learning_rate: 0.00002
  lora_learning_rate: 0.00001
